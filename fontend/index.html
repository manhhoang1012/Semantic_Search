

<!DOCTYPE html>
<html>
<head>
    <title>Manage Posts</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Manage Posts</h2>
        <button class="btn btn-primary" onclick="goToSearch()">🔍 Search Page</button>
    </div>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Add / Update Post</h5>

        <div class="row g-2">
            <div class="col-md-2">
                <input id="id" class="form-control" placeholder="ID">
            </div>
            <div class="col-md-4">
                <input id="title" class="form-control" placeholder="Title">
            </div>
            <div class="col-md-2">
                <input id="subreddit" class="form-control" placeholder="Subreddit">
            </div>
            <div class="col-md-2">
                <input id="score" class="form-control" placeholder="Score">
            </div>
            <div class="col-md-2">
                <input id="comments" class="form-control" placeholder="Comments">
            </div>
            <div class="col-md-3">
                <input id="username" class="form-control" placeholder="Username">
            </div>
        </div>

        <button class="btn btn-success mt-3" onclick="handleAdd()">💾 Save</button>
    </div>

    <!-- LIST -->
    <div class="card p-4 shadow-sm">
        <div class="d-flex justify-content-between">
            <h5>📊 Posts</h5>
            <button class="btn btn-secondary" onclick="loadData()">🔄 Load Data</button>
        </div>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Subreddit</th>
                    <th>Score</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/crud.js"></script>

<script>
function goToSearch() {
    window.location.href = "search.html";
}
</script>

</body>
</html>
