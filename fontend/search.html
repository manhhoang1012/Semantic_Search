


<!DOCTYPE html>
<html>
<head>
    <title>Semantic Search</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🔍 Semantic Search</h2>
        <button class="btn btn-secondary" onclick="goToIndex()">📋 Manage</button>
    </div>

    <!-- SEARCH BOX -->
    <div class="card p-4 mb-4 shadow-sm">
        <div class="row g-2">
            <div class="col-md-6">
                <input id="query" class="form-control" placeholder="Enter search query...">
            </div>

            <div class="col-md-2">
                <input id="top_k" class="form-control" value="5">
            </div>

            <div class="col-md-2">
                <input id="subreddit" class="form-control" placeholder="Filter subreddit">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="handleSearch()">Search</button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="row"></div>

</div>
<div class="alert alert-info" id="latency">
    ⏱ Response time: ...
</div>

<script src="js/api.js"></script>
<script src="js/search.js"></script>

<script>
function goToIndex() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
